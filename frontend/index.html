<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Compose Test App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .box { background: white; border: 1px solid #ccc; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #msg { color: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Frontend is working! 🚀</h1>
        <p>Message retrieved from Backend & Database:</p>
        <h2 id="msg">Loading...</h2>
    </div>
    <script>
        fetch('http://localhost:3000/api/message')
            .then(response => response.json())
            .then(data => {
                document.getElementById('msg').innerText = data.message || data.error;
            })
            .catch(error => {
                document.getElementById('msg').innerText = 'Failed to connect to backend';
                document.getElementById('msg').style.color = 'red';
            });
    </script>
</body>
</html>
